[package]
name = "cpu6502"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bitflags = "2.4"
num-traits = "0.2"
strum = "0.25"
strum_macros = "0.25"
log = { version = "0.4", optional = true }
simplelog = { version = "0.12.0", optional = true }
disasm6502 = { version = "0.2.2", optional = true }
enum-primitive-derive = {  version = "0.3.0", optional = true }

[dev-dependencies]
rand = "0.8"
serde = { version = "1.0.145", features = ["derive"] }

[features]
default = []
decimal = []
undoc_opcodes = []
disassembly = ["dep:disasm6502"]
logging = ["dep:log", "dep:simplelog"]
decode_logic = ["dep:enum-primitive-derive"]
gen_write_cycle_query = []