[package]
name = "cpu6502"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bitflags = "1.3"
enum-primitive-derive = "0.1"
num-traits = "0.1"
#once_cell = "1.15.0"
lazy_static = "1.4.0"
log = "0.4"
#log = { version = "0.4", optional = true }

[dev-dependencies]
strum = "0.24"
strum_macros = "0.24"
rand = "0.8"
serde = { version = "1.0.145", features = ["derive"] }
serde_json = "1.0.86"
disasm6502 = "0.2.2"
simplelog = "0.12.0"
#log = "0.4"

[features]
default = ["integration_test"]
decimal = []
undoc_opcodes = []
integration_test = []